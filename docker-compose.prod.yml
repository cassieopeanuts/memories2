version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: memories_db_prod
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-cass}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-supersecurepassword123}
      POSTGRES_DB: ${DB_NAME:-memories}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-cass} -d ${DB_NAME:-memories}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: memories_backend_prod
    restart: always
    command: npm start
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DB_USER=${DB_USER:-cass}
      - DB_PASSWORD=${DB_PASSWORD:-supersecurepassword123}
      - DB_HOST=db
      - DB_NAME=${DB_NAME:-memories}
      - DB_PORT=5432
      - JWT_SECRET=${JWT_SECRET:-ag_very_secret_token_12345!}
      - MOCK_S3=${MOCK_S3:-false}
      - S3_ENDPOINT=${S3_ENDPOINT:-https://s3.ru-1.storage.selcloud.ru}
      - S3_REGION=${S3_REGION:-ru-1}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - YANDEX_CLIENT_ID=${YANDEX_CLIENT_ID}
      - YANDEX_CLIENT_SECRET=${YANDEX_CLIENT_SECRET}
      - REDIRECT_URI=${REDIRECT_URI}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-465}
      - SMTP_SECURE=${SMTP_SECURE:-true}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - FEEDBACK_RECEIVER=${FEEDBACK_RECEIVER}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        - VITE_API_URL=${VITE_API_URL:-https://xn--e1aflcbbgbbec7c.xn--p1ai}
    container_name: memories_frontend_prod
    restart: always
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      - backend

volumes:
  postgres_data_prod:
